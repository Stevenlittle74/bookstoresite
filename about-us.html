<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Haven - About Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="images/Client3_Logo_Red.png" alt="Book Haven Red Logo">
        <h1 class="display-title">About Us</h1>
    </header>

    <main>
        <section>
            <h2 class="title-large">Business Details</h2>
            <p class="body">Brookhaven's local sanctuary for book lovers.</p>
            <h3 class="title">Hours</h3>
            <p class="body">Mon-Fri: 9am-8pm | Sat: 10am-6pm | Sun: 11am-5pm</p>
        </section>

        <section id="feedback">
            <h3 class="title">Feedback & Orders</h3>
            <form>
                <label class="body-strong">Name:</label><br>
                <input type="text" required style="width:100%; margin-bottom:10px;"><br>
                <label class="body-strong">Message:</label><br>
                <textarea required style="width:100%; height:100px; margin-bottom:10px;"></textarea><br>
                <button type="button" onclick="alert('Thank you for your message.')">Submit</button>
            </form>
        </section>
    </main>

    <footer>
        <button type="button" onclick="alert('Thank you for subscribing.')">Subscribe</button>
    </footer>
</body>
</html>
