<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About Us - Book Haven</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="images/Client3_Logo_Red.png" alt="Book Haven Red Logo">
        <h1 class="display-title">About Us</h1>
    </header>

    <main>
        <section id="feedback">
            <h3 class="title">Custom Order Form</h3>
            <form id="orderForm">
                <label class="body-strong">Customer Name:</label><br>
                <input type="text" id="custName" required style="width:100%; margin-bottom:10px;"><br>
                
                <label class="body-strong">Custom Order Details:</label><br>
                <textarea id="orderDetails" required style="width:100%; height:100px; margin-bottom:10px;"></textarea><br>
                
                <button type="button" onclick="saveCustomOrder()">Submit Custom Order</button>
            </form>
        </section>
    </main>

    <script>
        // Use localStorage for permanent customer information
        function saveCustomOrder() {
            const name = document.getElementById("custName").value;
            const details = document.getElementById("orderDetails").value;

            if (name && details) {
                const customOrder = {
                    customerName: name,
                    orderInfo: details,
                    timestamp: new Date().toLocaleString()
                };

                // Save to localStorage (persists even if browser closes)
                localStorage.setItem('savedCustomOrder', JSON.stringify(customOrder));
                
                alert("Success! Custom order for " + name + " has been saved to local storage.");
                document.getElementById("orderForm").reset();
            } else {
                alert("Please fill out both fields before submitting.");
            }
        }
    </script>
</body>
</html>
