<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Haven | Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="Logo.png" alt="Book Haven Logo" width="80">
        <h1>Our Collection</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="gallery.html">Gallery</a>
            <a href="about.html">About Us</a>
            <a href="staff.html">Staff Picks</a>
        </nav>
    </header>

    <a href="#" class="view-cart-btn">View Shopping Cart</a>

    <main class="gallery-grid">
        <div class="gallery-item">
            <img src="Client3_Book1.png" alt="Classic Novel">
            <h3>Classic Novel</h3>
            <p>$15.99</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>

        <div class="gallery-item">
            <img src="Client3_Magazine1.png" alt="Literary Journal">
            <h3>Literary Journal</h3>
            <p>$9.99</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>

        <div class="gallery-item">
            <img src="Client3_Notebook.png" alt="Writer's Notebook">
            <h3>Writer's Notebook</h3>
            <p>$12.50</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>

        <div class="gallery-item">
            <img src="Client3_ToteBag.png" alt="Bookish Tote">
            <h3>Bookish Tote</h3>
            <p>$18.00</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Book Haven Bookstore | <a href="#">Social Media</a></p>
    </footer>

</body>
</html>
