<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Haven - Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="images/Client3_Logo_Red.png" alt="Book Haven Red Logo">
        <h1 class="display-title">Gallery</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="about-us.html">About Us</a></li>
                <li><a href="staff-picks.html">Staff Picks</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2 class="title-large">Browse Our Items</h2>
        <table class="gallery-table">
            <tr>
                <th>Item</th>
                <th>Description</th>
                <th>Action</th>
            </tr>
            <tr>
                <td><img src="images/Client3_Book1.png" alt="Book 1" width="50"></td>
                <td class="body">The Quiet Reader: A bestseller in local fiction.</td>
                <td><button type="button" onclick="alert('Item added to the cart.')">Add to Cart</button></td>
            </tr>
        </table>

        <div style="margin-top: 30px;">
            <button type="button" onclick="alert('Cart cleared.')">Clear Cart</button>
            <button type="button" onclick="alert('Thank you for your order.')" style="margin-left:10px;">Process Order</button>
        </div>
    </main>

    <footer>
        <button type="button" onclick="alert('Thank you for subscribing.')">Subscribe</button>
    </footer>
</body>
</html>
