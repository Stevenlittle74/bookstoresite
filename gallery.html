<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery - Book Haven</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS for the View Cart Modal */
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: white; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 50%; border-radius: 8px; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <img src="images/Client3_Logo_Red.png" alt="Book Haven Red Logo">
        <h1 class="display-title">Gallery</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="about-us.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2 class="title-large">Our Collection</h2>
        <table class="gallery-table">
            <tr>
                <th>Item</th>
                <th>Description</th>
                <th>Action</th>
            </tr>
            <tr>
                <td><img src="images/Client3_Book1.png" alt="Book 1" width="50"></td>
                <td class="body">The Quiet Reader</td>
                <td><button type="button" onclick="addToCart('The Quiet Reader')">Add to Cart</button></td>
            </tr>
            <tr>
                <td><img src="images/Client3_Book2.png" alt="Book 2" width="50"></td>
                <td class="body">Mountain Echoes</td>
                <td><button type="button" onclick="addToCart('Mountain Echoes')">Add to Cart</button></td>
            </tr>
            </table>

        <div style="margin-top: 30px;">
            <button type="button" onclick="viewCart()">View Cart</button>
            <button type="button" onclick="clearCart()">Clear Cart</button>
        </div>

        <div id="cartModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h3 class="title">Your Shopping Cart</h3>
                <ul id="cartList" class="body"></ul>
                <button type="button" onclick="processOrder()">Process Order</button>
            </div>
        </div>
    </main>

    <script>
        // Use sessionStorage for the temporary shopping cart
        function addToCart(itemName) {
            let cart = JSON.parse(sessionStorage.getItem('bookHavenCart')) || [];
            cart.push(itemName);
            sessionStorage.setItem('bookHavenCart', JSON.stringify(cart));
            alert(itemName + " has been added to your session cart.");
        }

        function viewCart() {
            let cart = JSON.parse(sessionStorage.getItem('bookHavenCart')) || [];
            let cartList = document.getElementById("cartList");
            cartList.innerHTML = ""; // Clear existing list

            if (cart.length === 0) {
                cartList.innerHTML = "<li>Your cart is empty.</li>";
            } else {
                cart.forEach(item => {
                    let li = document.createElement("li");
                    li.textContent = item;
                    cartList.appendChild(li);
                });
            }
            document.getElementById("cartModal").style.display = "block";
        }

        function closeModal() {
            document.getElementById("cartModal").style.display = "none";
        }

        function clearCart() {
            sessionStorage.removeItem('bookHavenCart');
            alert("Session storage cleared. Cart is empty.");
        }

        function processOrder() {
            sessionStorage.removeItem('bookHavenCart');
            alert("Thank you for your order! Your session cart has been processed and cleared.");
            closeModal();
        }
    </script>
</body>
</html>
